<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FrameCheck</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #ECEAE4;
  --surface:  #FFFFFF;
  --hdr:      #111116;
  --border:   #D6D2CB;
  --border-hi:#B8B4AC;
  --red:      #C8281A;
  --red-dim:  rgba(200,40,26,0.06);
  --text:     #111116;
  --muted:    #76736C;
  --muted-hi: #4E4C47;
  --ok:       #19733E;
  --warn:     #9A5A00;
  --err:      #C8281A;
  --head:     'Bebas Neue', sans-serif;
  --body:     'DM Sans', sans-serif;
  --mono:     'DM Mono', monospace;
}

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--body);
  font-size: 14px;
  min-height: 100vh;
  padding-bottom: 86px;
}

/* ── APP HEADER ──────────────────────────────────────────── */
.app-hdr {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--hdr);
  height: 62px;
  padding: 0 36px;
  display: flex;
  align-items: center;
  gap: 28px;
}

.logo {
  font-family: var(--head);
  font-size: 28px;
  letter-spacing: 2px;
  line-height: 1;
  color: #fff;
  flex-shrink: 0;
}
.logo b { color: var(--red); font-weight: 400; }

.hdr-title {
  font-family: var(--mono);
  font-size: 10px;
  color: rgba(255,255,255,0.35);
  letter-spacing: 0.07em;
  text-transform: uppercase;
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.name-wrap {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 8px;
  padding: 6px 6px 6px 14px;
}
.name-lbl {
  font-family: var(--mono);
  font-size: 10px;
  color: rgba(255,255,255,0.55);
  text-transform: uppercase;
  letter-spacing: 0.09em;
  white-space: nowrap;
}
.name-inp {
  width: 230px;
  background: #fff;
  border: none;
  border-radius: 5px;
  color: var(--text);
  font-family: var(--body);
  font-size: 14px;
  font-weight: 600;
  padding: 7px 12px;
  outline: none;
  transition: box-shadow 0.15s;
}
.name-inp::placeholder { color: #AAA8A2; font-weight: 400; }
.name-inp:focus { box-shadow: 0 0 0 2px var(--red); }

/* ── CONTAINER ───────────────────────────────────────────── */
.container {
  max-width: 980px;
  margin: 0 auto;
  padding: 32px 22px 0;
}

/* ── SHOT ROW ────────────────────────────────────────────── */
.shot-row {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  margin-bottom: 18px;
  overflow: hidden;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.shot-row.s-in-progress { border-color: #C08A20; }
.shot-row.s-complete {
  border-color: #2E9A5A;
  box-shadow: 0 0 0 1px rgba(46,154,90,0.14);
}

.row-hdr {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 15px 22px 12px;
  border-bottom: 1px solid var(--border);
}
.row-num {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  flex-shrink: 0;
}
.row-type {
  font-family: var(--head);
  font-size: 24px;
  letter-spacing: 0.5px;
  line-height: 1;
  flex: 1;
}
.row-badge {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  padding: 4px 10px;
  border-radius: 20px;
  border: 1px solid currentColor;
  flex-shrink: 0;
}
.row-badge.empty       { color: var(--muted); border-color: var(--border); }
.row-badge.in-progress { color: var(--warn); }
.row-badge.complete    { color: var(--ok); }

.row-body {
  display: grid;
  grid-template-columns: 1fr 1fr;
}

/* ── UPLOAD PANEL ────────────────────────────────────────── */
.up-panel {
  padding: 18px 20px;
  border-right: 1px solid var(--border);
}

.up-box {
  position: relative;
  width: 100%;
  aspect-ratio: 16 / 9;
  background: #F4F2ED;
  border: 2px dashed var(--border-hi);
  border-radius: 8px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  transition: border-color 0.15s, background 0.15s;
  user-select: none;
}
.up-box:hover,
.up-box.drag-over {
  border-color: var(--red);
  background: var(--red-dim);
}
.up-box.has-img {
  border-style: solid;
  border-color: var(--border);
}
.up-box.has-img:hover { border-color: var(--red); }

.up-hint {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  pointer-events: none;
}
.up-icon {
  width: 32px;
  height: 32px;
  color: var(--muted);
  opacity: 0.55;
}
.up-lbl {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--muted);
  text-align: center;
  line-height: 1.55;
}
.up-sub {
  font-size: 10px;
  color: var(--muted);
  opacity: 0.5;
}

.prev-img {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: none;
}

.img-chip {
  position: absolute;
  top: 7px;
  right: 7px;
  width: 24px;
  height: 24px;
  border-radius: 50%;
  display: none;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 700;
  line-height: 1;
}
.img-chip.ok  { background: var(--ok); color: #fff; display: flex; }
.img-chip.bad { background: var(--err); color: #fff; display: flex; }

.recrop-btn {
  position: absolute;
  bottom: 7px;
  right: 7px;
  background: rgba(0,0,0,0.62);
  color: #fff;
  border: 1px solid rgba(255,255,255,0.18);
  border-radius: 4px;
  padding: 3px 9px;
  font-family: var(--mono);
  font-size: 10px;
  cursor: pointer;
  letter-spacing: 0.03em;
  opacity: 0;
  transition: opacity 0.15s;
}
.up-box:hover .recrop-btn { opacity: 1; }

.up-msg {
  margin-top: 8px;
  font-family: var(--mono);
  font-size: 11px;
  min-height: 16px;
  line-height: 1.4;
}
.up-msg.ok   { color: var(--ok); }
.up-msg.err  { color: var(--err); }
.up-msg.warn { color: var(--warn); }

input[type="file"] { display: none; }

/* ── ANALYSIS PANEL ──────────────────────────────────────── */
.an-panel {
  padding: 18px 20px;
  display: flex;
  flex-direction: column;
}
.an-q {
  font-family: var(--body);
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
  line-height: 1.35;
  margin-bottom: 11px;
}
.an-ta {
  flex: 1;
  background: #FAF9F6;
  border: 1px solid var(--border);
  border-radius: 7px;
  color: var(--text);
  font-family: var(--body);
  font-size: 13px;
  line-height: 1.65;
  padding: 11px 13px;
  resize: none;
  outline: none;
  min-height: 128px;
  transition: border-color 0.15s;
}
.an-ta::placeholder { color: var(--muted); opacity: 0.55; }
.an-ta:focus { border-color: var(--red); }

.char-ct {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--muted);
  text-align: right;
  margin-top: 7px;
  opacity: 0.7;
}

/* ── CROP MODAL ──────────────────────────────────────────── */
.modal-overlay {
  position: fixed;
  inset: 0;
  z-index: 500;
  background: rgba(0,0,0,0.74);
  display: none;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.modal-box {
  background: var(--surface);
  border-radius: 12px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  width: 100%;
  max-width: 760px;
  box-shadow: 0 28px 80px rgba(0,0,0,0.38);
}

.modal-hdr {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  padding: 18px 20px 14px;
  border-bottom: 1px solid var(--border);
}
.modal-title {
  font-family: var(--head);
  font-size: 22px;
  letter-spacing: 0.5px;
  line-height: 1;
}
.modal-sub {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 0.05em;
  margin-top: 4px;
}
.modal-x {
  background: none;
  border: none;
  color: var(--muted);
  font-size: 16px;
  cursor: pointer;
  padding: 2px 6px;
  border-radius: 4px;
  line-height: 1;
  transition: color 0.15s, background 0.15s;
  margin-left: 12px;
  flex-shrink: 0;
}
.modal-x:hover { color: var(--text); background: var(--bg); }

/* Grid guide overlay rendered in CSS, not canvas */
.canvas-wrap {
  position: relative;
  background: #181818;
  line-height: 0;
}
.canvas-wrap::after {
  content: '';
  position: absolute;
  inset: 0;
  pointer-events: none;
  border: 2px solid rgba(255,255,255,0.18);
}
#crop-canvas {
  display: block;
  width: 100%;
  height: auto;
  cursor: grab;
}
#crop-canvas:active { cursor: grabbing; }

.modal-ftr {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 20px;
  border-top: 1px solid var(--border);
}
.btn-reset {
  background: none;
  border: 1px solid var(--border-hi);
  border-radius: 6px;
  color: var(--muted-hi);
  font-family: var(--mono);
  font-size: 11px;
  padding: 7px 14px;
  cursor: pointer;
  letter-spacing: 0.04em;
  transition: border-color 0.15s, color 0.15s;
}
.btn-reset:hover { border-color: var(--text); color: var(--text); }

.modal-acts { display: flex; gap: 9px; }

.btn-cancel {
  background: none;
  border: 1px solid var(--border-hi);
  border-radius: 6px;
  color: var(--muted-hi);
  font-family: var(--body);
  font-size: 13px;
  font-weight: 500;
  padding: 8px 18px;
  cursor: pointer;
  transition: border-color 0.15s, color 0.15s;
}
.btn-cancel:hover { border-color: var(--text); color: var(--text); }

.btn-apply {
  background: var(--red);
  border: none;
  border-radius: 6px;
  color: #fff;
  font-family: var(--body);
  font-size: 13px;
  font-weight: 600;
  padding: 8px 22px;
  cursor: pointer;
  transition: background 0.15s;
}
.btn-apply:hover { background: #A82214; }

/* ── STICKY BAR ──────────────────────────────────────────── */
.sticky-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 200;
  background: var(--surface);
  border-top: 1px solid var(--border);
  box-shadow: 0 -4px 22px rgba(0,0,0,0.07);
  padding: 12px 36px;
  display: flex;
  align-items: center;
  gap: 24px;
}

.bar-left {
  display: flex;
  align-items: center;
  gap: 14px;
  flex-shrink: 0;
}
.bar-ct {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--muted);
  white-space: nowrap;
}
.bar-ct strong {
  font-family: var(--head);
  font-size: 20px;
  color: var(--text);
  letter-spacing: 0.5px;
  vertical-align: middle;
}
.dots { display: flex; gap: 5px; }
.dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--border-hi);
  transition: background 0.22s;
}
.dot.in-progress { background: var(--warn); }
.dot.complete    { background: var(--ok); }

.bar-checks {
  display: flex;
  gap: 20px;
  flex: 1;
}
.chk {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--muted);
  display: flex;
  align-items: center;
  gap: 5px;
  white-space: nowrap;
  transition: color 0.18s;
}
.chk.pass { color: var(--ok); }
.chk .ci { font-size: 12px; }

.exp-btn {
  flex-shrink: 0;
  background: var(--red);
  color: #fff;
  border: none;
  border-radius: 7px;
  padding: 10px 26px;
  font-family: var(--head);
  font-size: 19px;
  letter-spacing: 1.5px;
  cursor: pointer;
  transition: background 0.15s, transform 0.12s, box-shadow 0.15s, opacity 0.15s;
}
.exp-btn:not(:disabled):hover {
  background: #A82214;
  transform: translateY(-1px);
  box-shadow: 0 4px 16px rgba(200,40,26,0.32);
}
.exp-btn:disabled {
  background: var(--border-hi);
  color: var(--muted);
  cursor: not-allowed;
}
.exp-btn.busy { opacity: 0.6; cursor: wait; }

/* ── RESPONSIVE ──────────────────────────────────────────── */
@media (max-width: 680px) {
  .row-body      { grid-template-columns: 1fr; }
  .up-panel      { border-right: none; border-bottom: 1px solid var(--border); }
  .app-hdr       { padding: 0 18px; gap: 14px; }
  .hdr-title     { display: none; }
  .sticky-bar    { padding: 10px 18px; flex-wrap: wrap; gap: 10px; }
  .bar-checks    { display: none; }
  .container     { padding: 18px 14px 0; }
}
</style>
</head>
<body>

<!-- ── HEADER ────────────────────────────────────────────── -->
<header class="app-hdr">
  <div class="logo">Frame<b>Check</b></div>
  <div class="hdr-title">Assignment 1.1 — On Location Camera Composition</div>
  <div class="name-wrap">
    <label class="name-lbl" for="sname">Student</label>
    <input type="text" id="sname" class="name-inp" placeholder="Your full name" autocomplete="name">
  </div>
</header>

<!-- ── CROP MODAL ────────────────────────────────────────── -->
<div id="crop-modal" class="modal-overlay">
  <div class="modal-box">
    <div class="modal-hdr">
      <div>
        <div class="modal-title">Crop to 16:9</div>
        <div class="modal-sub">Drag to reposition &nbsp;·&nbsp; Scroll or pinch to zoom</div>
      </div>
      <button class="modal-x" onclick="closeCrop()">✕</button>
    </div>
    <div class="canvas-wrap">
      <canvas id="crop-canvas" width="720" height="405"></canvas>
    </div>
    <div class="modal-ftr">
      <button class="btn-reset" onclick="resetCrop()">Reset Position</button>
      <div class="modal-acts">
        <button class="btn-cancel" onclick="closeCrop()">Cancel</button>
        <button class="btn-apply" onclick="applyCrop()">Apply Crop</button>
      </div>
    </div>
  </div>
</div>

<!-- ── SHOT ROWS ─────────────────────────────────────────── -->
<main class="container" id="app"></main>

<!-- ── STICKY BAR ────────────────────────────────────────── -->
<div class="sticky-bar">
  <div class="bar-left">
    <div class="bar-ct"><strong id="rc">0</strong>&thinsp;of 5 complete</div>
    <div class="dots">
      <div class="dot" data-i="0"></div>
      <div class="dot" data-i="1"></div>
      <div class="dot" data-i="2"></div>
      <div class="dot" data-i="3"></div>
      <div class="dot" data-i="4"></div>
    </div>
  </div>
  <div class="bar-checks">
    <div class="chk" id="chk-n"><span class="ci">○</span>Student name</div>
    <div class="chk" id="chk-i"><span class="ci">○</span>Images uploaded</div>
    <div class="chk" id="chk-t"><span class="ci">○</span>Analyses written</div>
  </div>
  <button class="exp-btn" id="exp-btn" disabled onclick="exportPDF()">Export PDF</button>
</div>

<script>
/* ── DATA ───────────────────────────────────────────────── */
const SHOTS = [
  { type: 'Wide Shot',        q: 'What makes this a wide shot?'        },
  { type: 'Full Shot',        q: 'What makes this a full shot?'         },
  { type: 'Medium Shot',      q: 'What makes this a medium shot?'       },
  { type: 'Close Up',         q: 'What makes this a close up?'          },
  { type: 'Extreme Close Up', q: 'What makes this an extreme close up?' },
];

const ST = SHOTS.map(() => ({
  dataUrl: null,  // final cropped 16:9 JPEG stored here
  rawUrl:  null,  // original file for re-crop
  text:    '',
  status:  'empty',
}));

/* ── BUILD ROWS ─────────────────────────────────────────── */
function buildRows() {
  const app = document.getElementById('app');
  SHOTS.forEach((sh, i) => {
    const div = document.createElement('div');
    div.className = 'shot-row';
    div.id = `row-${i}`;
    div.innerHTML = `
      <div class="row-hdr">
        <span class="row-num">${String(i + 1).padStart(2, '0')}</span>
        <span class="row-type">${sh.type}</span>
        <span class="row-badge empty" id="bdg-${i}">Empty</span>
      </div>
      <div class="row-body">
        <div class="up-panel">
          <div class="up-box" id="upbox-${i}"
               onclick="pickFile(${i})"
               ondragover="onDOver(event,${i})"
               ondragleave="onDLeave(event,${i})"
               ondrop="onDDrop(event,${i})">
            <div class="up-hint" id="hint-${i}">
              <svg class="up-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <rect x="2" y="5" width="20" height="15" rx="2.5"/>
                <circle cx="8.5" cy="10.5" r="1.5"/>
                <polyline points="21 15 16 10 10 17"/>
                <polyline points="14 17 18 13 21 16"/>
              </svg>
              <div class="up-lbl">Drop image here<br>or click to upload</div>
              <div class="up-sub">Landscape images only — will be cropped to 16:9</div>
            </div>
            <img class="prev-img" id="prev-${i}" alt="shot preview">
            <div class="img-chip" id="chip-${i}"></div>
            <button class="recrop-btn" onclick="event.stopPropagation();reCrop(${i})">Adjust Crop</button>
          </div>
          <div class="up-msg" id="umsg-${i}"></div>
          <input type="file" accept="image/*" id="fi-${i}" onchange="onFSel(event,${i})">
        </div>
        <div class="an-panel">
          <div class="an-q">${sh.q}</div>
          <textarea class="an-ta" id="ta-${i}" placeholder="Share your analysis…" oninput="onText(${i})"></textarea>
          <div class="char-ct" id="cc-${i}">0 characters</div>
        </div>
      </div>`;
    app.appendChild(div);
  });
}

/* ── FILE HANDLING ──────────────────────────────────────── */
function pickFile(i) { document.getElementById(`fi-${i}`).click(); }

function onDOver(e, i)  { e.preventDefault(); document.getElementById(`upbox-${i}`).classList.add('drag-over'); }
function onDLeave(e, i) { document.getElementById(`upbox-${i}`).classList.remove('drag-over'); }
function onDDrop(e, i) {
  e.preventDefault();
  document.getElementById(`upbox-${i}`).classList.remove('drag-over');
  const f = e.dataTransfer.files[0];
  if (f && f.type.startsWith('image/')) processFile(f, i);
}
function onFSel(e, i) {
  const f = e.target.files[0];
  if (f) processFile(f, i);
  e.target.value = '';
}

function processFile(file, i) {
  const reader = new FileReader();
  reader.onload = ev => {
    const raw = ev.target.result;
    const img = new Image();
    img.onload = () => {
      if (img.naturalHeight > img.naturalWidth) {
        setMsg(i, '✕  Vertical images aren\'t allowed — use a landscape photo.', 'err');
        return;
      }
      setMsg(i, '', '');
      ST[i].rawUrl = raw;
      openCrop(raw, i);
    };
    img.src = raw;
  };
  reader.readAsDataURL(file);
}

function reCrop(i) {
  if (ST[i].rawUrl) openCrop(ST[i].rawUrl, i);
}

function setMsg(i, txt, cls) {
  const el = document.getElementById(`umsg-${i}`);
  el.textContent = txt;
  el.className = `up-msg ${cls}`;
}

/* ── CROP TOOL ──────────────────────────────────────────── */
// Logical canvas dimensions (always 720×405, CSS scales it)
const CW = 720, CH = 405;

const ct = {
  img: null, minScale: 1, scale: 1,
  panX: 0, panY: 0,
  dragging: false, lastX: 0, lastY: 0,
  pinchDist: 0, rowIdx: -1,
};

function openCrop(dataUrl, rowIdx) {
  ct.rowIdx = rowIdx;
  ct.img = new Image();
  ct.img.onload = () => {
    initCropPos();
    drawCrop();
    document.getElementById('crop-modal').style.display = 'flex';
  };
  ct.img.src = dataUrl;
}

function closeCrop() {
  document.getElementById('crop-modal').style.display = 'none';
}

function initCropPos() {
  const fw = CW / ct.img.naturalWidth;
  const fh = CH / ct.img.naturalHeight;
  ct.minScale = Math.max(fw, fh);
  ct.scale    = ct.minScale;
  ct.panX     = (CW - ct.img.naturalWidth  * ct.scale) / 2;
  ct.panY     = (CH - ct.img.naturalHeight * ct.scale) / 2;
  clampPan();
}

function resetCrop() { initCropPos(); drawCrop(); }

function clampPan() {
  const iw = ct.img.naturalWidth  * ct.scale;
  const ih = ct.img.naturalHeight * ct.scale;
  ct.panX = Math.min(0, Math.max(CW - iw, ct.panX));
  ct.panY = Math.min(0, Math.max(CH - ih, ct.panY));
}

function drawCrop() {
  const canvas = document.getElementById('crop-canvas');
  const ctx    = canvas.getContext('2d');
  ctx.clearRect(0, 0, CW, CH);
  if (ct.img) {
    ctx.drawImage(
      ct.img,
      ct.panX, ct.panY,
      ct.img.naturalWidth * ct.scale,
      ct.img.naturalHeight * ct.scale
    );
  }
}

// Convert browser event coords → logical canvas coords
function evXY(e) {
  const canvas = document.getElementById('crop-canvas');
  const rect   = canvas.getBoundingClientRect();
  const sx     = CW / rect.width;
  const sy     = CH / rect.height;
  const src    = e.touches ? e.touches[0] : e;
  return { x: (src.clientX - rect.left) * sx, y: (src.clientY - rect.top) * sy };
}

// Mouse events
function onCMD(e) {
  e.preventDefault();
  const p = evXY(e);
  ct.dragging = true; ct.lastX = p.x; ct.lastY = p.y;
}
function onCMM(e) {
  if (!ct.dragging) return;
  e.preventDefault();
  const p = evXY(e);
  ct.panX += p.x - ct.lastX; ct.panY += p.y - ct.lastY;
  ct.lastX = p.x; ct.lastY = p.y;
  clampPan(); drawCrop();
}
function onCMU() { ct.dragging = false; }

// Scroll to zoom
function onCWheel(e) {
  e.preventDefault();
  const p   = evXY(e);
  const fac = e.deltaY < 0 ? 1.1 : 0.9;
  const ns  = Math.max(ct.minScale, Math.min(ct.scale * fac, ct.minScale * 6));
  // Zoom toward cursor
  const ix  = (p.x - ct.panX) / ct.scale;
  const iy  = (p.y - ct.panY) / ct.scale;
  ct.scale  = ns; ct.panX = p.x - ix * ns; ct.panY = p.y - iy * ns;
  clampPan(); drawCrop();
}

// Touch helpers
function tDist(e) {
  const dx = e.touches[0].clientX - e.touches[1].clientX;
  const dy = e.touches[0].clientY - e.touches[1].clientY;
  return Math.hypot(dx, dy);
}

function onCTS(e) {
  e.preventDefault();
  if (e.touches.length === 1) {
    const p = evXY(e); ct.dragging = true; ct.lastX = p.x; ct.lastY = p.y;
  } else if (e.touches.length === 2) {
    ct.dragging = false; ct.pinchDist = tDist(e);
  }
}
function onCTM(e) {
  e.preventDefault();
  if (e.touches.length === 1 && ct.dragging) {
    const p = evXY(e);
    ct.panX += p.x - ct.lastX; ct.panY += p.y - ct.lastY;
    ct.lastX = p.x; ct.lastY = p.y;
    clampPan(); drawCrop();
  } else if (e.touches.length === 2) {
    const d   = tDist(e);
    const fac = d / ct.pinchDist;
    ct.pinchDist = d;
    // Pinch midpoint in canvas coords
    const canvas = document.getElementById('crop-canvas');
    const rect   = canvas.getBoundingClientRect();
    const sx     = CW / rect.width, sy = CH / rect.height;
    const mx = ((e.touches[0].clientX + e.touches[1].clientX) / 2 - rect.left) * sx;
    const my = ((e.touches[0].clientY + e.touches[1].clientY) / 2 - rect.top)  * sy;
    const ns = Math.max(ct.minScale, Math.min(ct.scale * fac, ct.minScale * 6));
    const ix = (mx - ct.panX) / ct.scale;
    const iy = (my - ct.panY) / ct.scale;
    ct.scale = ns; ct.panX = mx - ix * ns; ct.panY = my - iy * ns;
    clampPan(); drawCrop();
  }
}
function onCTE(e) { if (e.touches.length === 0) ct.dragging = false; }

// Render crop to 1280×720 JPEG and save to row state
function applyCrop() {
  if (!ct.img || ct.rowIdx < 0) return;
  const i      = ct.rowIdx;
  const OUT_W  = 1280, OUT_H = 720;
  const oc     = document.createElement('canvas');
  oc.width     = OUT_W; oc.height = OUT_H;
  const ctx    = oc.getContext('2d');

  // Map the 720×405 viewport back to source image coordinates
  const srcX = -ct.panX / ct.scale;
  const srcY = -ct.panY / ct.scale;
  const srcW =  CW / ct.scale;
  const srcH =  CH / ct.scale;
  ctx.drawImage(ct.img, srcX, srcY, srcW, srcH, 0, 0, OUT_W, OUT_H);

  ST[i].dataUrl = oc.toDataURL('image/jpeg', 0.92);

  // Update UI
  const prev = document.getElementById(`prev-${i}`);
  const hint = document.getElementById(`hint-${i}`);
  const box  = document.getElementById(`upbox-${i}`);
  const chip = document.getElementById(`chip-${i}`);

  prev.src           = ST[i].dataUrl;
  prev.style.display = 'block';
  hint.style.display = 'none';
  box.classList.add('has-img');
  chip.className     = 'img-chip ok';
  chip.textContent   = '✓';
  setMsg(i, '✓  Image cropped and ready', 'ok');

  updateRow(i);
  updateBar();
  closeCrop();
}

/* ── TEXT INPUT ─────────────────────────────────────────── */
function onText(i) {
  const ta = document.getElementById(`ta-${i}`);
  const cc = document.getElementById(`cc-${i}`);
  ST[i].text = ta.value;
  const n = ta.value.length;
  cc.textContent = n === 1 ? '1 character' : `${n} characters`;
  updateRow(i);
  updateBar();
}

/* ── STATUS ─────────────────────────────────────────────── */
function updateRow(i) {
  const s      = ST[i];
  const hasImg = s.dataUrl !== null;
  const hasTxt = s.text.trim().length > 0;
  s.status     = !hasImg && !hasTxt ? 'empty'
               :  hasImg && hasTxt  ? 'complete'
               : 'in-progress';

  const badge = document.getElementById(`bdg-${i}`);
  badge.className   = `row-badge ${s.status}`;
  badge.textContent = s.status === 'empty'       ? 'Empty'
                    : s.status === 'in-progress' ? 'In Progress'
                    : 'Complete';

  document.getElementById(`row-${i}`).className = `shot-row s-${s.status}`;
}

function updateBar() {
  const done   = ST.filter(s => s.status === 'complete').length;
  const nameOk = document.getElementById('sname').value.trim().length > 0;
  const imgOk  = ST.every(s => s.dataUrl !== null);
  const txtOk  = ST.every(s => s.text.trim().length > 0);

  document.getElementById('rc').textContent = done;
  ST.forEach((s, i) => {
    document.querySelector(`.dot[data-i="${i}"]`).className = `dot ${s.status}`;
  });

  setChk('chk-n', nameOk);
  setChk('chk-i', imgOk);
  setChk('chk-t', txtOk);

  // Export requires only a student name; all else is optional
  document.getElementById('exp-btn').disabled = !nameOk;
}

function setChk(id, pass) {
  const el = document.getElementById(id);
  el.className = pass ? 'chk pass' : 'chk';
  el.querySelector('.ci').textContent = pass ? '✓' : '○';
}

document.getElementById('sname').addEventListener('input', updateBar);

/* ── PDF EXPORT ─────────────────────────────────────────── */
async function exportPDF() {
  if (!window.jspdf) { alert('PDF library not loaded — check your connection.'); return; }
  const btn  = document.getElementById('exp-btn');
  const orig = btn.textContent;
  btn.classList.add('busy'); btn.textContent = 'Generating…'; btn.disabled = true;

  try {
    const { jsPDF } = window.jspdf;
    const student   = document.getElementById('sname').value.trim();
    const pdf       = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
    const PW = 210, PH = 297, M = 14;
    const CW_PDF = PW - M * 2;
    const IW = CW_PDF, IH = IW * 9 / 16;

    for (let i = 0; i < SHOTS.length; i++) {
      if (i > 0) pdf.addPage();
      const s = ST[i], sh = SHOTS[i];

      // White page
      pdf.setFillColor(255, 255, 255);
      pdf.rect(0, 0, PW, PH, 'F');

      // Dark header bar
      pdf.setFillColor(17, 17, 22);
      pdf.rect(0, 0, PW, 18, 'F');
      pdf.setTextColor(255, 255, 255);
      pdf.setFont('helvetica', 'bold');
      pdf.setFontSize(12);
      pdf.text('FRAMECHECK', M, 12);
      pdf.setTextColor(100, 96, 90);
      pdf.setFont('helvetica', 'normal');
      pdf.setFontSize(7);
      pdf.text('Assignment 1.1 — On Location Camera Composition', M + 35, 9);
      pdf.setTextColor(170, 166, 160);
      pdf.text(student, PW - M, 13, { align: 'right' });

      // Shot type label
      pdf.setTextColor(17, 17, 22);
      pdf.setFont('helvetica', 'bold');
      pdf.setFontSize(22);
      pdf.text(sh.type.toUpperCase(), M, 32);
      pdf.setTextColor(120, 116, 108);
      pdf.setFont('helvetica', 'normal');
      pdf.setFontSize(8);
      pdf.text(`SHOT ${i + 1} OF ${SHOTS.length}`, M, 39);

      // Image
      const imgY = 44;
      if (s.dataUrl) {
        pdf.addImage(s.dataUrl, 'JPEG', M, imgY, IW, IH, undefined, 'MEDIUM');
      } else {
        pdf.setFillColor(232, 230, 225);
        pdf.rect(M, imgY, IW, IH, 'F');
        pdf.setTextColor(158, 154, 146);
        pdf.setFontSize(9);
        pdf.text('No image provided', M + IW / 2, imgY + IH / 2, { align: 'center' });
      }

      // Analysis section
      const secY = imgY + IH + 10;
      pdf.setDrawColor(212, 208, 202);
      pdf.setLineWidth(0.25);
      pdf.line(M, secY - 3, PW - M, secY - 3);

      pdf.setTextColor(80, 76, 70);
      pdf.setFont('helvetica', 'bold');
      pdf.setFontSize(8);
      pdf.text(sh.q.toUpperCase(), M, secY + 4);

      pdf.setTextColor(22, 22, 28);
      pdf.setFont('helvetica', 'normal');
      pdf.setFontSize(10);
      const body = s.text.trim() || 'No analysis provided.';
      pdf.text(pdf.splitTextToSize(body, CW_PDF), M, secY + 14);

      // Footer strip
      pdf.setFillColor(238, 236, 230);
      pdf.rect(0, PH - 11, PW, 11, 'F');
      pdf.setTextColor(148, 144, 136);
      pdf.setFont('helvetica', 'normal');
      pdf.setFontSize(7);
      pdf.text(`${student}  ·  FrameCheck`, M, PH - 4);
      pdf.text(`${i + 1} / ${SHOTS.length}`, PW - M, PH - 4, { align: 'right' });
    }

    pdf.save(`FrameCheck_${student.replace(/\s+/g, '_')}_Assignment1.1.pdf`);
  } catch (err) {
    console.error(err);
    alert('Export failed — see browser console for details.');
  } finally {
    btn.classList.remove('busy');
    btn.textContent = orig;
    updateBar();
  }
}

/* ── INIT ───────────────────────────────────────────────── */
buildRows();
updateBar();

// Attach crop canvas events after DOM is ready
const cc = document.getElementById('crop-canvas');
cc.addEventListener('mousedown',  onCMD);
cc.addEventListener('mousemove',  onCMM);
cc.addEventListener('mouseup',    onCMU);
cc.addEventListener('mouseleave', onCMU);
cc.addEventListener('wheel',      onCWheel, { passive: false });
cc.addEventListener('touchstart', onCTS,    { passive: false });
cc.addEventListener('touchmove',  onCTM,    { passive: false });
cc.addEventListener('touchend',   onCTE);

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeCrop(); });
</script>
</body>
